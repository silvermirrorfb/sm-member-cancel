<!-- Silver Mirror Chat Widget — paste before </body> -->
<script>
(function() {
  var WIDGET_URL = 'https://sm-member-cancel.vercel.app';

  // Create styles
  var style = document.createElement('style');
  style.textContent = [
    '#sm-chat-icon{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:50%;background:#fff;border:2px solid #e2e8f0;box-shadow:0 4px 20px rgba(0,0,0,.12);cursor:pointer;z-index:99999;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:transform .2s,box-shadow .2s}',
    '#sm-chat-icon:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(0,0,0,.18)}',
    '#sm-chat-icon img{width:44px;height:44px;border-radius:50%;object-fit:cover}',
    '#sm-chat-icon::after{content:"";position:absolute;width:100%;height:100%;border-radius:50%;border:2px solid #50aaf2;animation:smp 2s ease-out 1s 3;opacity:0}',
    '@keyframes smp{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.5);opacity:0}}',
    '#sm-chat-popup{position:fixed;bottom:96px;right:24px;width:400px;height:580px;max-height:calc(100vh - 120px);border-radius:16px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.16);border:1px solid #e2e8f0;z-index:99998;display:none;flex-direction:column;background:#fff;opacity:0;transform:translateY(16px) scale(.96);transition:opacity .25s,transform .25s}',
    '#sm-chat-popup.sm-open{display:flex;opacity:1;transform:translateY(0) scale(1)}',
    '#sm-chat-popup.sm-closing{opacity:0;transform:translateY(16px) scale(.96)}',
    '#sm-chat-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.06);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;font-size:14px;color:#6b7280;transition:background .15s}',
    '#sm-chat-close:hover{background:rgba(0,0,0,.12);color:#1a1a1a}',
    '#sm-chat-popup iframe{flex:1;width:100%;border:none;background:#fff}',
    '@media(max-width:480px){#sm-chat-icon{bottom:16px;right:16px;width:54px;height:54px}#sm-chat-icon img{width:38px;height:38px}#sm-chat-popup{bottom:0;right:0;left:0;width:100%;height:100%;max-height:100vh;border-radius:0;border:none}#sm-chat-close{top:14px;right:14px;width:32px;height:32px;font-size:16px}}'
  ].join('');
  document.head.appendChild(style);

  // Create icon
  var icon = document.createElement('div');
  icon.id = 'sm-chat-icon';
  icon.setAttribute('role', 'button');
  icon.setAttribute('tabindex', '0');
  icon.setAttribute('aria-label', 'Open chat');
  icon.innerHTML = '<img src="' + WIDGET_URL + '/sm-logo.jpg" alt="Silver Mirror" />';
  document.body.appendChild(icon);

  // Create popup
  var popup = document.createElement('div');
  popup.id = 'sm-chat-popup';
  popup.innerHTML = '<button id="sm-chat-close" aria-label="Close chat">&times;</button><iframe id="sm-chat-iframe" title="Silver Mirror Chat"></iframe>';
  document.body.appendChild(popup);

  var isOpen = false, loaded = false;

  function toggle() {
    if (isOpen) {
      popup.classList.add('sm-closing');
      setTimeout(function() {
        popup.classList.remove('sm-open', 'sm-closing');
        popup.style.display = 'none';
        icon.style.display = 'flex';
      }, 250);
      isOpen = false;
    } else {
      if (!loaded) {
        document.getElementById('sm-chat-iframe').src = WIDGET_URL + '/widget';
        loaded = true;
      }
      popup.style.display = 'flex';
      popup.offsetHeight;
      popup.classList.add('sm-open');
      icon.style.display = 'none';
      isOpen = true;
    }
  }

  icon.addEventListener('click', toggle);
  icon.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
  });
  document.getElementById('sm-chat-close').addEventListener('click', toggle);
})();
</script>
