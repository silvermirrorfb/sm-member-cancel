<!-- 
  Silver Mirror Membership Chat Widget
  
  Drop this snippet onto any WordPress page to embed the membership assistant.
  
  Recommended: Create a page at silvermirror.com/cancel-membership
  and paste this in the HTML block.
-->

<style>
  #sm-cancel-widget {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    height: 700px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    border: 1px solid #e2e8f0;
  }
  #sm-cancel-widget iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  @media (max-width: 600px) {
    #sm-cancel-widget {
      height: 85vh;
      max-width: 100%;
      border-radius: 8px;
      margin: 0 8px;
    }
  }
</style>

<div id="sm-cancel-widget">
  <iframe 
    src="https://sm-member-cancel.vercel.app/widget" 
    title="Silver Mirror Membership Assistant"
    allow="clipboard-write"
  ></iframe>
</div>
