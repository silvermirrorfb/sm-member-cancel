<!-- 
  Silver Mirror Cancellation Chat Widget
  
  Drop this snippet onto any WordPress page to embed the cancellation assistant.
  Replace YOUR_VERCEL_URL with your actual deployment URL.
  
  Recommended: Create a page at silvermirror.com/cancel-membership
  and paste this in the HTML block.
-->

<!-- Option A: Full-page embed (recommended for a dedicated /cancel-membership page) -->
<div id="sm-cancel-widget" style="width:100%;max-width:520px;margin:0 auto;height:700px;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.12);">
  <iframe 
    src="https://YOUR_VERCEL_URL/widget" 
    style="width:100%;height:100%;border:none;" 
    title="Silver Mirror Membership Assistant"
    allow="clipboard-write"
  ></iframe>
</div>
